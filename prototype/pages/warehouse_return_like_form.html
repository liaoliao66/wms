<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>类资产归还 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="warehouse_return_list" data-title="类资产归还" data-breadcrumb="物资管理 / 类资产归还">
  <div id="main-content">
    <div data-wms-modal data-modal-back="warehouse_return_list.html" data-modal-size="xl" data-wms-return-form data-return-material-type="like" data-return-expected-asset="">
      <div class="wms-modal-form wms-warehouse-form wms-return-form">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">借用信息</h3></div>
        <div class="md:col-span-2 overflow-hidden rounded-xl border border-slate-200">
    <table class="min-w-full text-sm"><tbody><tr><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">领用单号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="requisitionNo">LY202606070003</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">出库单号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="outboundNo">—</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">借用人</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="borrower">李工</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">借用人部门</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="borrowerDept">设备部</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">出库日期</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="outboundDate">—</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">应还日期</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="dueDate">2026-07-09</td></tr></tbody></table>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">物资信息</h3></div>
        <div class="md:col-span-2 overflow-hidden rounded-xl border border-slate-200">
    <table class="min-w-full text-sm"><tbody><tr><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">资产编码</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="assetCode">—</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资编码</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="code">LA-00456</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资名称</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="name">电钻</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资大类</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="major">资产-类资产</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">规格型号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="spec">650W</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">计量单位</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="unit">台</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">出库数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="outboundQty">3</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">已还数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="returnedQty">0</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">待还数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="pendingQty"><span class="font-semibold text-slate-900">3</span></td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资子类</td><td class="px-4 py-2.5 text-sm text-slate-800" data-return-field="minor">电动工具</td></tr></tbody></table>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">归还信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">归还单号</label><input type="text" value="HK20260610001" readonly data-return-field="returnNo" class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 归还日期</label><input type="date" value="2026-06-09" data-return-field="returnDate" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 实物状态</label><select data-return-field="condition" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>完好</option><option>需维修</option><option>损坏</option></select></div>
        <div class="md:col-span-2" data-wms-return-like-qty><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 本次归还数量</label><input type="number" min="1" placeholder="请输入" data-return-field="thisReturnQty" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /><p class="mt-2 text-xs text-slate-500">可与下方回库货位分行数量一致，或仅填总数由系统按行汇总校验</p></div><div class="md:col-span-2" data-wms-return-locations>
    <div class="mb-2 flex flex-wrap items-center justify-between gap-2">
      <h4 class="text-sm font-semibold text-slate-800">回库货位</h4>
      <button type="button" class="text-sm font-medium text-slate-700 hover:underline" data-return-loc-add>添加</button>
    </div>
    <div data-return-loc-list><div class="return-loc-row mb-3 grid gap-3 rounded-xl border border-slate-200 bg-slate-50/40 p-3 sm:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_minmax(0,1fr)_100px_auto] sm:items-end" data-return-loc-row>
    <div><label class="mb-1 block text-xs font-medium text-slate-600"><span class="text-rose-500">*</span> 仓库</label><select data-return-warehouse class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>主仓库</option><option>辅仓库</option></select></div>
    <div><label class="mb-1 block text-xs font-medium text-slate-600">货架</label><select data-return-shelf class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>CK001001-HJ001</option><option>CK001001-HJ002</option><option>CK001001-HJ003</option><option>CK001001-HJ101</option></select></div>
    <div><label class="mb-1 block text-xs font-medium text-slate-600">架层</label><select data-return-level class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>1层</option><option>2层</option><option>3层</option></select></div>
    <div><label class="mb-1 block text-xs font-medium text-slate-600"><span class="text-rose-500">*</span> 数量</label><input type="number" min="1" data-return-qty placeholder="请输入" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
    <span class="w-10"></span>
  </div></div>
    <p class="mt-2 text-xs text-slate-500">归还物资回库位置；各行数量之和不超过待还数量 <strong data-return-pending-qty-display>—</strong></p>
  </div>
        <div class="md:col-span-2 rounded-xl border border-amber-100 bg-amber-50/50 p-4">
    <div class="mb-1 flex items-center gap-2 text-sm font-semibold text-slate-900"><i class="fa-solid fa-screwdriver-wrench text-amber-600"></i> 类资产按数量归还</div>
    <p class="text-xs text-slate-600">支持分批归还；指定回库货位后累加库存，待还数量相应减少。</p>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">其他信息</h3></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">归还说明</label><textarea rows="3" placeholder="0/500" data-return-field="remark" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">归还照片</label><div class="wms-photo-upload">
    <button type="button" class="flex h-20 w-20 flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-200 text-slate-400 hover:border-slate-300 hover:bg-slate-50">
      <i class="fa-solid fa-plus text-lg"></i>
      <span class="mt-1 text-xs">上传图片</span>
    </button>
    <p class="mt-2 text-xs text-slate-400">支持 .jpg .jpeg .png，单个文件不能超过 100MB</p>
  </div></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 验收人员</label><select data-return-field="operator" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>张仓管</option><option>李仓管</option></select></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 验收部门</label><select data-return-field="department" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>物资管理部</option><option>设备部</option></select></div>
      </div>
      <div class="wms-modal-footer">
        <a href="warehouse_return_list.html" class="wms-btn wms-btn-secondary" data-return-back-link>取消</a>
        <button type="button" class="wms-btn wms-btn-primary" data-return-submit>确定</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
