<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>评价等级设置 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="config_eval_grade" data-title="评价等级设置" data-breadcrumb="基础配置 / 评价设置 / 评价等级">
  <div id="main-content">
    <div class="mb-6 flex flex-wrap gap-2 border-b border-slate-100 pb-4">
    <a href="config_eval_weight.html" class="rounded-xl px-4 py-2 text-sm font-medium transition bg-white text-slate-600 ring-1 ring-slate-200 hover:bg-slate-50">权重设置</a><a href="config_eval_grade.html" class="rounded-xl px-4 py-2 text-sm font-medium transition bg-slate-900 text-white">评价等级设置</a>
  </div>
    <div class="card rounded-2xl bg-white p-5 shadow-sm" data-wms-eval-grade-page>
      <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <p class="text-sm text-slate-500">将综合评分映射为评价等级；区间须完整覆盖 0～10 分且不重叠。</p>
        <span class="inline-flex items-center gap-2 rounded-lg bg-slate-100 px-3 py-1.5 text-xs text-slate-600">当前版本 <strong class="text-slate-900">V2026-001</strong> · 生效 2026-01-01</span>
      </div>
      <div class="overflow-x-auto wms-modal-table-wrap mb-4">
        <table class="min-w-full wms-data-table text-sm">
          <thead class="bg-slate-50/80"><tr>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">序号</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"><span class="text-rose-500">*</span> 评价等级</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"><span class="text-rose-500">*</span> 最低分（含）</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"><span class="text-rose-500">*</span> 最高分（不含，10 分含）</th>
            <th class="wms-col-actions px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500">操作</th>
          </tr></thead>
          <tbody data-wms-eval-grade-tbody>
    <tr class="border-t border-slate-100" data-wms-eval-grade-row>
      <td class="px-4 py-3 text-sm text-slate-500">1</td>
      <td class="px-4 py-3"><input type="text" value="优秀" data-eval-grade-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="9" data-eval-grade-min class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="10" data-eval-grade-max class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-grade-delete>删除</button></td>
    </tr>
    <tr class="border-t border-slate-100" data-wms-eval-grade-row>
      <td class="px-4 py-3 text-sm text-slate-500">2</td>
      <td class="px-4 py-3"><input type="text" value="良好" data-eval-grade-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="7" data-eval-grade-min class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="9" data-eval-grade-max class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-grade-delete>删除</button></td>
    </tr>
    <tr class="border-t border-slate-100" data-wms-eval-grade-row>
      <td class="px-4 py-3 text-sm text-slate-500">3</td>
      <td class="px-4 py-3"><input type="text" value="合格" data-eval-grade-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="6" data-eval-grade-min class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="7" data-eval-grade-max class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-grade-delete>删除</button></td>
    </tr>
    <tr class="border-t border-slate-100" data-wms-eval-grade-row>
      <td class="px-4 py-3 text-sm text-slate-500">4</td>
      <td class="px-4 py-3"><input type="text" value="不合格" data-eval-grade-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="0" data-eval-grade-min class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3"><input type="number" step="0.1" min="0" max="10" value="6" data-eval-grade-max class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-28" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-grade-delete>删除</button></td>
    </tr></tbody>
        </table>
      </div>
      <button type="button" class="mb-4 inline-flex items-center gap-1.5 rounded-lg bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200 hover:bg-slate-50" data-eval-grade-add><i class="fa-solid fa-plus text-xs"></i> 添加</button>
      <div class="rounded-xl bg-slate-50 p-4 text-xs text-slate-600 leading-relaxed">
        <p class="font-semibold text-slate-700 mb-1">规则</p>
        <p>1. 各等级分数不能重叠，且需覆盖 0～10 分的完整范围</p>
        <p>2. 各等级包含下限、不包含上限；10 分为最高分，包含该分值</p>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        <button type="button" class="wms-btn wms-btn-primary" data-eval-grade-save>保存</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
