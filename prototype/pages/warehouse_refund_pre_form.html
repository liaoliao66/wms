<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>验收不合格退货 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="warehouse_refund_list" data-title="验收不合格退货" data-breadcrumb="物资管理 / 验收不合格退货">
  <div id="main-content">
    <div data-wms-modal data-modal-back="warehouse_refund_list.html" data-modal-size="xl" data-wms-refund-form data-refund-scene="pre_inbound">
      <div class="wms-modal-form wms-warehouse-form wms-refund-form">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">来源信息</h3></div>
        <div class="md:col-span-2 overflow-hidden rounded-xl border border-slate-200">
    <table class="min-w-full text-sm"><tbody><tr><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">供货单号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="supplyNo">GH2025004</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">供应商</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="supplier">江苏华能电子有限公司</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">联系人</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="contact">王工</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">联系电话</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="phone">139 1111 2233</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">验收单号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="acceptNo">GH2025004-YS02</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">验收日期</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="acceptDate">2025-11-25</td></tr></tbody></table>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">物资信息</h3></div>
        <div class="md:col-span-2 overflow-hidden rounded-xl border border-slate-200">
    <table class="min-w-full text-sm"><tbody><tr><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资编码</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="code">GD001001-004</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资名称</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="name">螺丝刀</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资大类</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="major">资产-固定资产</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资子类</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="minor">设备-配件</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">规格型号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="spec">455</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">计量单位</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="unit">个</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">不合格数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="unqualifiedQty">1</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">已退数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="refundedQty">0</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">待退数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="pendingQty"><span class="font-semibold text-slate-900">1</span></td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">退货场景</td><td class="px-4 py-2.5 text-sm text-slate-800" data-refund-field="sceneLabel"><span class="inline-flex rounded-lg px-2 py-0.5 text-xs font-medium ring-1 ring-inset bg-amber-50 text-amber-700 ring-amber-600/20">验收前</span></td></tr></tbody></table>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">退货信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">退货单号</label><input type="text" value="TH20260701001" readonly data-refund-field="refundNo" class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 退货日期</label><input type="date" value="2026-06-09" data-refund-field="refundDate" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 退货原因</label><select data-refund-field="refundReason" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>质量问题</option><option>多供</option><option>规格不符</option><option>其他</option></select></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 本次退货数量</label><input type="number" min="1" placeholder="请输入" data-refund-field="thisRefundQty" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /><p class="mt-2 text-xs text-slate-500">不超过待退数量 <strong data-refund-pending-qty-display>1</strong> 个</p></div>
        <div class="md:col-span-2 rounded-xl border border-orange-100 bg-orange-50/50 p-4">
    <div class="mb-1 flex items-center gap-2 text-sm font-semibold text-slate-900"><i class="fa-solid fa-clipboard-check text-orange-500"></i> 验收不合格退货</div>
    <p class="text-xs text-slate-600">物资尚未入库或在途待入账面；确认退货后回写供货单退货数量，合格品可继续入库。</p>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">其他信息</h3></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">退货说明</label><textarea rows="3" placeholder="0/500" data-refund-field="remark" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">退货照片</label><div class="wms-photo-upload">
    <button type="button" class="flex h-20 w-20 flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-200 text-slate-400 hover:border-slate-300 hover:bg-slate-50">
      <i class="fa-solid fa-plus text-lg"></i>
      <span class="mt-1 text-xs">上传图片</span>
    </button>
    <p class="mt-2 text-xs text-slate-400">支持 .jpg .jpeg .png，单个文件不能超过 100MB</p>
  </div></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 经办人</label><select data-refund-field="operator" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>张仓管</option><option>李仓管</option></select></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 经办部门</label><select data-refund-field="department" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>物资管理部</option><option>设备部</option></select></div>
      </div>
      <div class="wms-modal-footer">
        <a href="warehouse_refund_list.html" class="wms-btn wms-btn-secondary" data-refund-back-link>取消</a>
        <button type="button" class="wms-btn wms-btn-primary" data-refund-submit>确定</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
