<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新增仓库 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="config_warehouse" data-title="新增仓库" data-breadcrumb="基础配置 / 新增仓库">
  <div id="main-content">
    <div data-wms-modal data-modal-back="config_warehouse.html" data-modal-size="lg">
      <div class="wms-modal-form wms-warehouse-form">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">基础信息</h3></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">仓库编码</label><input type="text" value="系统自动生成" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500" /></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 仓库名称</label><input type="text" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">仓库类型</label><select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option>货品库</option><option>备件库</option><option>其他</option></select></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">建筑面积</label><input type="text" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">存储容量</label><input type="text" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">负责人</label><select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option>张三</option><option>李四</option><option>张飞</option></select></div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">其他信息</h3></div>
        <div class=" md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">介绍</label><textarea rows="3" placeholder="0/500" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">资料</label><div class="wms-upload-zone">
    <i class="fa-solid fa-cloud-arrow-up text-lg text-slate-400"></i>
    <p class="mt-2 text-sm text-slate-600">上传文件</p>
    <p class="mt-1 text-xs text-slate-400">支持 .rar .zip .doc .docx .pdf，单个文件不能超过 500MB</p>
  </div></div>
      </div>
      <div class="wms-modal-footer">
        <a href="config_warehouse.html" class="wms-btn wms-btn-secondary">取消</a>
        <button type="button" class="wms-btn wms-btn-primary">确定</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
