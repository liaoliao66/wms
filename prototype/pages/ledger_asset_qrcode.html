<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>资产二维码 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="ledger_warehouse" data-title="资产二维码" data-breadcrumb="物资台账 / 资产二维码">
  <div id="main-content">
    <div data-wms-modal data-modal-back="ledger_warehouse.html" data-modal-size="md">
      <div class="wms-qr-fullscreen text-center">
        <div class="mx-auto inline-block rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=wms%3A%2F%2Fasset%2FZC202606001" width="200" height="200" alt="资产二维码 ZC202606001" class="wms-qr-image" loading="lazy" />
          <div class="mt-4 font-mono text-sm font-semibold text-slate-900" data-asset-field="code">ZC202606001</div>
          <div class="mt-1 text-sm text-slate-600" data-asset-field="name">笔记本电脑</div>
          <div class="mt-0.5 text-xs text-slate-400" data-asset-field="location">主仓库/B区/B-03</div>
        </div>
        <p class="mt-4 text-xs text-slate-500">扫码解析：<code class="rounded bg-slate-100 px-1.5 py-0.5">wms://asset/ZC202606001</code></p>
      </div>
      <div class="wms-modal-footer">
        <a href="ledger_warehouse.html" class="wms-btn wms-btn-secondary">关闭</a>
        <button type="button" class="wms-btn wms-btn-secondary"><i class="fa-solid fa-print mr-1"></i>打印</button>
        <button type="button" class="wms-btn wms-btn-primary wms-qr-download-single" data-asset-code="ZC202606001"><i class="fa-solid fa-download mr-1"></i>下载 PNG</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
