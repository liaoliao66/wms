<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>验收记录详情 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="warehouse_acceptance_list" data-title="验收记录详情" data-breadcrumb="物资管理 / 验收记录详情">
  <div id="main-content">
    <div data-wms-modal data-modal-back="warehouse_acceptance_record.html" data-modal-size="lg" data-wms-acceptance-record-detail data-accept-record-no="GH2025004-YS02">
      <div class="wms-modal-form wms-acceptance-record-detail">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">验收信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">验收单号</label><input type="text" value="GH2025004-YS02" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="no" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">批次单号</label><input type="text" value="2" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="batchNo" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">本批次供货数量</label><input type="text" value="10" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="batchQty" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">验收日期</label><input type="text" value="2025-11-25" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="date" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">仓库验收人员</label><input type="text" value="李仓管" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="warehouse" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">计划验收人员</label><input type="text" value="赵工" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="planner" /></div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">合格物资</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">本批次合格数量</label><input type="text" value="9" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="qualified" /></div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">不合格物资</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">本批次不合格数量</label><input type="text" value="1" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="unqualified" /></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">不合格说明</label><textarea rows="2" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="unqualifiedRemark">刀头断裂，无法使用</textarea></div>
        
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">处理方式</label><input type="text" value="退货" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="disposition" /></div>
        <div class="md:col-span-2 rounded-xl border border-orange-100 bg-orange-50/50 p-4 text-xs text-slate-600">审核通过后已生成退货待办 <span class="font-mono font-medium">GH2025004-YS02-TH</span>，可在<a href="warehouse_refund_list.html" class="font-medium text-slate-900 hover:underline">物资退货</a>列表执行。</div>
      </div>
      <div class="wms-modal-footer">
        <a href="warehouse_acceptance_record.html" class="wms-btn wms-btn-secondary">关闭</a>
        <a href="warehouse_refund_pre_form.html?refundKey=GH2025004-YS02-TH&back=warehouse_refund_list.html" class="wms-btn wms-btn-primary">发起退货</a>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
