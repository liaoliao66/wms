<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新增物资 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="config_material_catalog" data-title="新增物资" data-breadcrumb="基础配置 / 新增物资">
  <div id="main-content">
    <div data-wms-modal data-modal-back="config_material_catalog.html" data-modal-size="xl">
      <div class="wms-modal-form wms-warehouse-form" data-wms-material-form data-material-type="fixed">
        <div class="md:col-span-2" data-wms-material-type-tabs>
    <label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 物资类型</label>
    <div class="flex flex-wrap gap-2"><button type="button" class="wms-material-type-tab rounded-xl px-4 py-2 text-sm font-medium bg-slate-900 text-white" data-wms-material-type-tab="fixed">固定资产</button><button type="button" class="wms-material-type-tab rounded-xl px-4 py-2 text-sm font-medium bg-white text-slate-600 ring-1 ring-slate-200 hover:bg-slate-50" data-wms-material-type-tab="like">类资产</button><button type="button" class="wms-material-type-tab rounded-xl px-4 py-2 text-sm font-medium bg-white text-slate-600 ring-1 ring-slate-200 hover:bg-slate-50" data-wms-material-type-tab="consumable">耗材</button></div>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">基础信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">物资编码</label><input type="text" value="系统自动生成" class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500" readonly readonly /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 物资名称</label><input type="text" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" placeholder="请输入" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 规格型号</label><input type="text" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" placeholder="请输入" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 物资大类</label>
    <select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" data-wms-material-major required><option value="" disabled selected>请选择</option><option value="资产-固定资产">资产-固定资产</option></select></div><div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 物资子类</label>
    <select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" data-wms-material-minor required><option value="" disabled selected>请选择</option><option value="办公电脑">办公电脑</option><option value="设备-配件">设备-配件</option></select></div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">计量核算信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 主计量单位</label>
    <select data-wms-material-unit="主计量单位" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" required>
      <option value="" disabled selected>请选择</option><option value="DW202606004" data-symbol="个">个（DW202606004）</option><option value="DW202606002" data-symbol="台">台（DW202606002）</option><option value="DW202606003" data-symbol="m">米（DW202606003）</option><option value="DW202606001" data-symbol="桶">桶（DW202606001）</option><option value="DW202606005" data-symbol="箱">箱（DW202606005）</option>
      <option value="—" data-symbol="—">—</option>
    </select></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">辅计量单位</label>
    <select data-wms-material-unit="辅计量单位" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200">
      <option value="" disabled selected>请选择</option><option value="DW202606004" data-symbol="个">个（DW202606004）</option><option value="DW202606002" data-symbol="台">台（DW202606002）</option><option value="DW202606003" data-symbol="m">米（DW202606003）</option><option value="DW202606001" data-symbol="桶">桶（DW202606001）</option><option value="DW202606005" data-symbol="箱">箱（DW202606005）</option>
      <option value="—" data-symbol="—">—</option>
    </select></div>
        <div class="md:col-span-2">
    <label class="mb-1.5 block text-sm font-medium text-slate-700">主辅单位换算</label>
    <div class="flex flex-wrap items-center gap-2 text-sm text-slate-700">
      <span class="text-slate-500">1</span>
      <input type="text" placeholder="请输入主单位" class="w-28 rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" value="" />
      <span class="text-slate-400">：</span>
      <input type="text" placeholder="请输入辅单位" class="w-28 rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" value="" />
    </div>
    <p class="mt-1.5 text-xs text-slate-400">注释：主单位即为 1，填写换算比</p>
  </div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 参考单价（元）</label><input type="number" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" placeholder="请输入" /></div>
        <div class="md:col-span-2" data-wms-material-business-return>
          <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">业务信息</h3></div>
          <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 归还</label><div class="flex flex-wrap gap-4 pt-1"><label class="inline-flex items-center gap-2 text-sm text-slate-700">
      <input type="radio" name="returnNeed" class="border-slate-300 text-slate-900" data-wms-material-return value="需要" checked />
      <span>需要</span>
    </label><label class="inline-flex items-center gap-2 text-sm text-slate-700">
      <input type="radio" name="returnNeed" class="border-slate-300 text-slate-900" data-wms-material-return value="不需要" />
      <span>不需要</span>
    </label></div></div>
        </div>
        <div class="md:col-span-2 hidden" data-wms-material-business-stock>
          <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">业务信息</h3></div>
          <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 安全库存</label><input type="number" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" placeholder="请输入" data-wms-material-safe /></div>
          <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 库存下限</label><input type="number" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" placeholder="请输入" data-wms-material-min /></div>
          <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 库存上限</label><input type="number" value="" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" placeholder="请输入" data-wms-material-max /></div>
        </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">其他</h3></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">说明</label><textarea rows="3" placeholder="0/500" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">资料</label><div class="wms-upload-zone">
    <i class="fa-solid fa-cloud-arrow-up text-lg text-slate-400"></i>
    <p class="mt-2 text-sm text-slate-600">上传文件</p>
    <p class="mt-1 text-xs text-slate-400">支持 .rar .zip .doc .docx .pdf，单个文件不能超过 500MB</p>
  </div></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">照片</label><div class="wms-photo-upload">
    <button type="button" class="flex h-20 w-20 flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-200 text-slate-400 hover:border-slate-300 hover:bg-slate-50">
      <i class="fa-solid fa-plus text-lg"></i>
      <span class="mt-1 text-xs">上传图片</span>
    </button>
    <p class="mt-2 text-xs text-slate-400">支持 .jpg .jpeg .png，单个文件不能超过 100MB</p>
  </div></div>
      </div>
      <div class="wms-modal-footer">
        <a href="config_material_catalog.html" class="wms-btn wms-btn-secondary">取消</a>
        <button type="button" class="wms-btn wms-btn-primary">确定</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
