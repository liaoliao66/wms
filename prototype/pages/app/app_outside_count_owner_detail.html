<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>归属确认 · WMS 移动盘点</title>
  <link rel="stylesheet" href="../../css/tailwind.css" />
  <link rel="stylesheet" href="../../css/custom.css" />
  <link rel="stylesheet" href="../../vendor/fontawesome/css/all.min.css" />
</head>
<body class="wms-app-body" data-page="app_outside_count" data-title="归属确认">
  <div class="wms-device-stage">
    <div class="wms-iphone16">
      <div class="wms-dynamic-island" aria-hidden="true"></div>
      <div class="wms-app-screen">
        <div class="wms-ios-status" aria-hidden="true">
    <span class="wms-ios-time">9:41</span>
    <div class="wms-ios-status-right">
      <i class="fa-solid fa-signal"></i>
      <i class="fa-solid fa-wifi"></i>
      <span class="wms-ios-battery" title="电量 85%"><i class="fa-solid fa-battery-three-quarters"></i><span>85%</span></span>
    </div>
  </div>
        <header class="wms-app-nav">
    <a href="app_outside_count_owner_list.html" class="wms-app-back wms-app-btn" aria-label="返回"><i class="fa-solid fa-chevron-left"></i></a>
    <h1 class="wms-app-nav-title">归属确认</h1>
    <span class="wms-app-back-spacer"></span>
  </header>
        <main class="wms-app-main">
          
          <div class="wms-app-pad wms-app-pad--top">
      <div class="wms-app-stack">
        <div class="wms-app-card p-4">
          <p class="text-base font-semibold text-zinc-900">铝合金梯</p>
          <p class="mt-0.5 font-mono text-[11px] text-zinc-500">LA-00331</p>
          <dl class="mt-4 space-y-3 text-sm">
            <div class="flex justify-between gap-4"><dt class="text-zinc-500">原归属人</dt><dd class="font-medium text-zinc-900">王工</dd></div>
            <div class="flex justify-between gap-4"><dt class="text-zinc-500">新归属人</dt><dd class="font-medium text-zinc-900">赵六（您）</dd></div>
            <div class="flex justify-between gap-4"><dt class="text-zinc-500">原位置</dt><dd class="font-medium text-zinc-900">城东项目部</dd></div>
            <div class="flex justify-between gap-4"><dt class="text-zinc-500">新位置</dt><dd class="font-medium text-zinc-900">维保部仓库</dd></div>
            <div><dt class="text-zinc-500">变更原因</dt><dd class="mt-1 text-zinc-800">使用人调岗</dd></div>
          </dl>
        </div>
        <div class="wms-app-field"><label>拒绝原因（选填）</label><textarea rows="2" placeholder="拒绝时填写原因…"></textarea></div>
        <div class="grid grid-cols-2 gap-2">
          <button type="button" class="wms-app-cta wms-app-btn" data-wms-outside-owner-accept>确认接受</button>
          <button type="button" class="wms-app-cta wms-app-cta--secondary wms-app-btn" data-wms-outside-owner-reject>拒绝</button>
        </div>
      </div>
    </div>
        </main>
        
        
        <div class="wms-home-indicator" aria-hidden="true"></div>
        <div id="wms-outside-count-toast" class="hidden" role="status"></div>
      </div>
    </div>
  </div>
  <script src="../../js/layout.js" charset="UTF-8"></script>
</body></html>
