<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>完成供货 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="purchase_supply_list" data-title="完成供货" data-breadcrumb="采购管理 / 完成供货">
  <div id="main-content">
    <div data-wms-modal data-modal-back="purchase_supply_list.html" data-modal-size="lg" data-wms-supply-complete>
      <p class="mb-4 hidden rounded-xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800" data-supply-from-hint>
        <i class="fa-solid fa-circle-info mr-1.5"></i>从物资验收进入 · 提交后将同步关闭验收待办，并返回物资验收列表
      </p>
      <div class="wms-modal-form wms-warehouse-form wms-supply-complete-form">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">供货信息</h3></div>
        <div class="md:col-span-2 wms-supply-info-grid overflow-hidden rounded-xl border border-slate-200">
    <table class="min-w-full text-sm"><tbody>
      <tr><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资供货单号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="supplyNo">GH2025003</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">供应商名称</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="supplier">河南蒲瑞</td></tr>
      <tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资编码</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="code">GD001001-003</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资名称</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="name">钢丝绳</td></tr>
      <tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">需求数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="required">100</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">已供货数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="supplied">50</td></tr>
      <tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">合格数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="qualified">50</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">不合格数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="unqualified">0</td></tr>
      <tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">退货数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="returned">0</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">待供货数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-supply-field="pending">50</td></tr>
    </tbody></table>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">其他信息</h3></div>
        <p class="md:col-span-2 text-sm text-slate-500">一些特殊情况，无法完成供货，给予相应的订单终结</p>
        <div class="md:col-span-2">
          <label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 完成供货</label>
          <div class="flex flex-wrap gap-4 pt-1">
            <label class="inline-flex items-center gap-2 text-sm text-slate-700"><input type="radio" name="supplyComplete" class="border-slate-300 text-slate-900" value="是" /><span>是</span></label>
            <label class="inline-flex items-center gap-2 text-sm text-slate-700"><input type="radio" name="supplyComplete" class="border-slate-300 text-slate-900" value="否" checked /><span>否</span></label>
          </div>
        </div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 说明</label><textarea rows="4" placeholder="0/500" data-supply-complete-remark class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">附件</label><div class="wms-upload-zone">
    <i class="fa-solid fa-cloud-arrow-up text-lg text-slate-400"></i>
    <p class="mt-2 text-sm text-slate-600">上传文件</p>
    <p class="mt-1 text-xs text-slate-400">支持 .rar .zip .doc .docx .pdf，单个文件不能超过 500MB</p>
  </div></div>
      </div>
      <p class="mt-4 text-xs text-slate-400" data-supply-complete-hint>提交后将更新供货状态，并引导至物资验收列表</p>
      <div class="wms-modal-footer">
        <a href="purchase_supply_list.html" class="wms-btn wms-btn-secondary" data-supply-back-link>取消</a>
        <button type="button" class="wms-btn wms-btn-primary" data-supply-complete-submit>确定</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
