<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>消息中心 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="purchase_message" data-title="消息中心" data-breadcrumb="采购管理 / 消息中心">
  <div id="main-content">
    <div class="space-y-3">
      
        <div class="card flex cursor-pointer items-start gap-4 rounded-2xl bg-white p-4">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-slate-100 text-slate-600"><i class="fa-solid fa-file-circle-check"></i></div>
          <div class="flex-1"><div class="mb-1 flex items-center gap-2"><span class="text-xs font-medium text-slate-900">待审批</span><span class="text-xs text-slate-400">10 分钟前</span></div><p class="text-sm text-slate-600">采购申请 CG202606090002 待您审批</p></div>
          <i class="fa-solid fa-chevron-right text-slate-300 text-xs mt-2"></i>
        </div>
        <div class="card flex cursor-pointer items-start gap-4 rounded-2xl bg-white p-4">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-slate-100 text-slate-600"><i class="fa-solid fa-arrow-down-to-bracket"></i></div>
          <div class="flex-1"><div class="mb-1 flex items-center gap-2"><span class="text-xs font-medium text-slate-900">待入库</span><span class="text-xs text-slate-400">1 小时前</span></div><p class="text-sm text-slate-600">验收单 YS202606080015 已通过，请安排入库</p></div>
          <i class="fa-solid fa-chevron-right text-slate-300 text-xs mt-2"></i>
        </div>
        <div class="card flex cursor-pointer items-start gap-4 rounded-2xl bg-white p-4">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-slate-100 text-slate-600"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <div class="flex-1"><div class="mb-1 flex items-center gap-2"><span class="text-xs font-medium text-slate-900">超期提醒</span><span class="text-xs text-slate-400">今天 08:00</span></div><p class="text-sm text-slate-600">资产 LA-00331 归还已超期 4 天</p></div>
          <i class="fa-solid fa-chevron-right text-slate-300 text-xs mt-2"></i>
        </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
