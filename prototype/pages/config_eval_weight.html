<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>权重设置 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="config_eval_weight" data-title="权重设置" data-breadcrumb="基础配置 / 评价设置 / 权重设置">
  <div id="main-content">
    <div class="mb-6 flex flex-wrap gap-2 border-b border-slate-100 pb-4">
    <a href="config_eval_weight.html" class="rounded-xl px-4 py-2 text-sm font-medium transition bg-slate-900 text-white">权重设置</a><a href="config_eval_grade.html" class="rounded-xl px-4 py-2 text-sm font-medium transition bg-white text-slate-600 ring-1 ring-slate-200 hover:bg-slate-50">评价等级设置</a>
  </div>
    <div class="card rounded-2xl bg-white p-5 shadow-sm" data-wms-eval-weight-page>
      <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <p class="text-sm text-slate-500">维护供应商评价评分指标及权重系数；新建评价单创建时快照当前版本。</p>
        <span class="inline-flex items-center gap-2 rounded-lg bg-slate-100 px-3 py-1.5 text-xs text-slate-600">当前版本 <strong class="text-slate-900">V2026-001</strong> · 生效 2026-01-01</span>
      </div>
      <div class="overflow-x-auto wms-modal-table-wrap mb-4">
        <table class="min-w-full wms-data-table text-sm">
          <thead class="bg-slate-50/80"><tr>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">序号</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"><span class="text-rose-500">*</span> 指标名称</th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"><span class="text-rose-500">*</span> 权重系数</th>
            <th class="wms-col-actions px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500">操作</th>
          </tr></thead>
          <tbody data-wms-eval-weight-tbody>
    <tr class="border-t border-slate-100" data-wms-eval-weight-row>
      <td class="px-4 py-3 text-sm text-slate-500">1</td>
      <td class="px-4 py-3"><input type="text" value="产品质量" data-eval-indicator-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.01" min="0" max="1" value="0.4" data-eval-indicator-weight class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-32" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-weight-delete>删除</button></td>
    </tr>
    <tr class="border-t border-slate-100" data-wms-eval-weight-row>
      <td class="px-4 py-3 text-sm text-slate-500">2</td>
      <td class="px-4 py-3"><input type="text" value="交货及时性" data-eval-indicator-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.01" min="0" max="1" value="0.2" data-eval-indicator-weight class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-32" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-weight-delete>删除</button></td>
    </tr>
    <tr class="border-t border-slate-100" data-wms-eval-weight-row>
      <td class="px-4 py-3 text-sm text-slate-500">3</td>
      <td class="px-4 py-3"><input type="text" value="售后服务" data-eval-indicator-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.01" min="0" max="1" value="0.2" data-eval-indicator-weight class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-32" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-weight-delete>删除</button></td>
    </tr>
    <tr class="border-t border-slate-100" data-wms-eval-weight-row>
      <td class="px-4 py-3 text-sm text-slate-500">4</td>
      <td class="px-4 py-3"><input type="text" value="价格合理性" data-eval-indicator-name class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></td>
      <td class="px-4 py-3"><input type="number" step="0.01" min="0" max="1" value="0.2" data-eval-indicator-weight class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 w-32" /></td>
      <td class="px-4 py-3 text-right"><button type="button" class="text-sm text-rose-600 hover:underline" data-eval-weight-delete>删除</button></td>
    </tr></tbody>
        </table>
      </div>
      <button type="button" class="mb-4 inline-flex items-center gap-1.5 rounded-lg bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200 hover:bg-slate-50" data-eval-weight-add><i class="fa-solid fa-plus text-xs"></i> 添加</button>
      <div class="rounded-xl bg-slate-50 p-4 text-xs text-slate-600 leading-relaxed">
        <p class="font-semibold text-slate-700 mb-1">计算说明</p>
        <p>综合评分 = Σ(维度得分 × 权重系数) / Σ(权重系数)</p>
        <p class="mt-1">示例：质量 9 分（0.4）、交货 8 分（0.2）、服务 7 分（0.2）→ (9×0.4+8×0.2+7×0.2)/(0.4+0.2+0.2) = 8.25 分</p>
        <p class="mt-2 text-slate-500">权重系数之和建议为 1.0；保存后生成新版本，仅对新建评价单生效，已建单保留创建时快照。</p>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        <button type="button" class="wms-btn wms-btn-primary" data-eval-weight-save>保存</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
