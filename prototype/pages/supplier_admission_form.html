<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登记申报 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="supplier_admission_list" data-title="登记申报" data-breadcrumb="供应商管理 / 登记申报">
  <div id="main-content">
    <div data-wms-modal data-modal-back="supplier_admission_list.html" data-modal-size="lg">
      <div class="wms-modal-form wms-warehouse-form">
        <div class="md:col-span-2 rounded-lg border border-sky-100 bg-sky-50/80 px-3 py-2 text-xs text-sky-900">
          设备技术部接收供应商申报资料并登记；资料缺失、格式不符的当场退回补正，不予进入审核流程。
        </div>

        <!-- 申报信息 -->
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">申报信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 供应商全称</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 供应商简称</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 统一社会信用代码</label><input type="text" maxlength="18" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 供应商类型</label><select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option>设备配件供应商</option><option>耗材供应商</option><option>电气材料供应商</option><option>办公耗材供应商</option><option>安防物资供应商</option><option>化工物资供应商</option><option>定制生产供应商</option></select></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 法定代表人</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>

        <!-- 联系信息 -->
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">联系信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">联系人</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">联系电话</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">经营地址</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>

        <!-- 资质与开票 -->
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">资质与开票</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">开户银行</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">对公账号</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">开票抬头</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">开票税号</label><input type="text" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>

        <!-- 申报说明 -->
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">申报说明</h3></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 是否需要现场审核</label>
          <div class="flex flex-wrap gap-4 text-sm">
            <label class="inline-flex items-center gap-2"><input type="radio" name="needSiteAudit" value="是" class="rounded-full border-slate-300" /> 是</label>
            <label class="inline-flex items-center gap-2"><input type="radio" name="needSiteAudit" value="否" checked class="rounded-full border-slate-300" /> 否</label>
          </div>
        </div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">供货范围说明</label><textarea rows="2" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>

        <!-- 申报资料 -->
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">申报资料</h3></div>
        <div class="md:col-span-2"><div class="wms-upload-zone">
          <i class="fa-solid fa-cloud-arrow-up text-lg text-slate-400"></i>
          <p class="mt-2 text-sm text-slate-600">上传文件</p>
          <p class="mt-1 text-xs text-slate-400">支持 .rar .zip .doc .docx .pdf，单个文件不能超过 500MB</p>
        </div></div>
      </div>
      <div class="wms-modal-footer">
        <a href="supplier_admission_list.html" class="wms-btn wms-btn-secondary">取消</a>
        <button type="button" class="wms-btn wms-btn-primary">提交登记</button>
      </div>
    </div>
  </div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body>
</html>
