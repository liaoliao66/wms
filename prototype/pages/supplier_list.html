    </select>

  </div><button type="button" class="hidden shrink-0 items-center gap-1.5 rounded-xl px-3 py-2 text-sm text-slate-600 hover:bg-slate-100" data-wms-list-reset><i class="fa-solid fa-rotate-left text-xs"></i>重置</button></div><div class="mb-4" data-wms-list-add-row><a href="supplier_form.html" class="inline-flex shrink-0 items-center justify-center gap-2 min-w-[96px] rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-slate-800 transition whitespace-nowrap"><i class="fa-solid fa-plus text-xs"></i>新增</a></div>
      <div class="card overflow-hidden rounded-2xl bg-white shadow-sm" data-wms-list-card>

t-slate-700 whitespace-nowrap">鄂东办公用品</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">刘主管</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">139****3302</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap"><span class="inline-flex rounded-lg px-2 py-0.5 text-xs font-medium ring-1 ring-inset bg-emerald-50 text-emerald-700 ring-emerald-600/20">正常</span></td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">2026-02-20</td><td class="wms-col-actions px-4 py-3.5 text-slate-900 text-right text-sm whitespace-nowrap"><a href="#" class="hover:underline">查看</a></td></tr></tbody></table></div>

  </div>
        <div class="flex flex-wrap items-center justify-between gap-3 border-t border-slate-100 px-4 py-3 text-sm text-slate-500">

    <div class="flex flex-wrap items-center gap-2">
