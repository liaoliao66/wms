<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>验收审核 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="warehouse_acceptance_audit_list" data-title="验收审核" data-breadcrumb="物资管理 / 验收审核">
  <div id="main-content">
    <div data-wms-modal data-modal-back="warehouse_acceptance_audit_list.html" data-modal-size="lg" data-wms-acceptance-audit-form data-accept-record-no="GH2025003-YS01">
      
      <div class="wms-modal-form wms-acceptance-record-detail">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">验收信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">验收单号</label><input type="text" value="GH2025003-YS01" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="no" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">批次单号</label><input type="text" value="1" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="batchNo" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">本批次供货数量</label><input type="text" value="50" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="batchQty" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">验收日期</label><input type="text" value="2025-11-20" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="date" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">仓库验收人员</label><input type="text" value="张仓管" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="warehouse" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">计划验收人员</label><input type="text" value="王工" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="planner" /></div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">合格物资</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">本批次合格数量</label><input type="text" value="50" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="qualified" /></div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">不合格物资</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">本批次不合格数量</label><input type="text" value="0" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="unqualified" /></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">不合格说明</label><textarea rows="2" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" data-accept-record-field="unqualifiedRemark">—</textarea></div>
        
      </div>
      
  
      <div class="wms-modal-form wms-warehouse-form">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">审核</h3></div>
        <div class="md:col-span-2">
          <label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 审核结论</label>
          <div class="wms-radio-group">
            <label class="wms-radio-option"><input type="radio" name="accept_audit_result" checked /> 通过</label>
            <label class="wms-radio-option"><input type="radio" name="accept_audit_result" /> 驳回</label>
          </div>
        </div>
        <div class="md:col-span-2">
          <label class="mb-1.5 block text-sm font-medium text-slate-700">审核意见</label>
          <textarea rows="3" placeholder="请输入审核意见（驳回必填）" data-accept-audit-opinion class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea>
        </div>
      </div>
      <div class="wms-modal-footer">
        <a href="warehouse_acceptance_audit_list.html" class="wms-btn wms-btn-secondary" data-accept-audit-back>取消</a>
        <button type="button" class="wms-btn wms-btn-primary">提交审核</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
