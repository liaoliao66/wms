<body data-page="purchase_plan_apply" data-title="添加物资" data-breadcrumb="采购管理 / 添加采购明细">
  <div id="main-content">

        <div class="relative shrink-0 w-[280px]">

    <input type="search" data-wms-list-search placeholder="搜索物资编码、名称…" class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-9 pr-9 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" />

  </div>
      </div>
      <div class="wms-modal-table-wrap"><table class="min-w-full text-sm"><thead class="bg-slate-50/80"><tr><th class="w-10 px-4 py-3"><input type="checkbox" class="rounded border-slate-300" /></th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 whitespace-nowrap">物资编码</th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 whitespace-nowrap">物资名称</th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 whitespace-nowrap">计划数量</th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 whitespace-nowrap">参考单价</th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 whitespace-nowrap">计量单位</th></tr></thead><tbody><tr class="border-t border-slate-100 hover:bg-slate-50/80">
      <td class="px-4 py-3"><input type="checkbox" class="rounded border-slate-300" checked /></td>
