        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">任务编号</label><input type="text" value="KWT202606290001" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600" /></div>

                </tr>
              </thead>
              <tbody>
                <tr class="border-t border-slate-100"><td class="px-4 py-3.5 font-mono text-xs">ZC202605012</td><td class="px-4 py-3.5">工程测量仪</td><td class="px-4 py-3.5">武穴大桥施工点</td><td class="px-4 py-3.5">王工</td><td class="px-4 py-3.5"><span class="inline-flex rounded-lg px-2 py-0.5 text-xs font-medium ring-1 ring-inset bg-slate-100 text-slate-700 ring-slate-600/10">未确认</span></td></tr>
