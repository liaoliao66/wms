          <div><span class="text-sky-700/80">计划名称：</span>2026 年中固定资产盘点</div>

          <div><dt class="text-slate-500">应盘 / 已盘 / 差异</dt><dd class="mt-0.5">42 / 28 / 1</dd></div>
        </dl>
      </div>
    </div>
    <div class="wms-modal-footer mt-4">
