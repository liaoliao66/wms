<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>类资产出库 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="warehouse_outbound_list" data-title="类资产出库" data-breadcrumb="物资管理 / 类资产出库">
  <div id="main-content">
    <div data-wms-modal data-modal-back="warehouse_outbound_list.html" data-modal-size="xl" data-wms-outbound-form data-outbound-material-type="like">
      <div class="wms-modal-form wms-warehouse-form wms-outbound-form">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">领用信息</h3></div>
        <div class="md:col-span-2 overflow-hidden rounded-xl border border-slate-200">
    <table class="min-w-full text-sm"><tbody><tr><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">领用单号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="requisitionNo">LY202606070003</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">申请事由</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="reason">设备维修</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">关联计划</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="plan">—</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">申请时间</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="applyTime">2026-06-07</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">申请人</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="applicant">李工</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">申请部门</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="applicantDept">设备部</td></tr></tbody></table>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">物资信息</h3></div>
        <div class="md:col-span-2 overflow-hidden rounded-xl border border-slate-200">
    <table class="min-w-full text-sm"><tbody><tr><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资编码</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="code">LA-00456</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资名称</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="name">电钻</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资大类</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="major">资产-类资产</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">物资子类</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="minor">电动工具</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">规格型号</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="spec">650W</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">计量单位</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="unit">台</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">申请数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="applyQty">3</td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">已出库数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="outboundQty">0</td></tr><tr class="border-t border-slate-200"><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">待出库数量</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="pendingQty"><span class="font-semibold text-slate-900">3</span></td><td class="w-[18%] bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-500">归还要求</td><td class="px-4 py-2.5 text-sm text-slate-800" data-outbound-field="needReturn"><span class="inline-flex rounded-lg px-2 py-0.5 text-xs font-medium ring-1 ring-inset bg-slate-100 text-slate-700 ring-slate-600/10">需归还</span></td></tr></tbody></table>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">出库信息</h3></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700">出库单号</label><input type="text" value="CK20260716001" readonly data-outbound-field="outboundNo" class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 出库日期</label><input type="date" value="2026-06-09" data-outbound-field="outboundDate" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 领用人</label><select data-outbound-field="recipient" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled>请选择</option><option>王工</option><option selected>李工</option><option>张三</option><option>赵六</option></select></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 领用部门</label><select data-outbound-field="recipientDept" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled>请选择</option><option>工程部</option><option selected>设备部</option><option>行政部</option><option>维保部</option></select></div>
        <div class="md:col-span-2" data-wms-outbound-locations>
    <div class="mb-2 flex flex-wrap items-center justify-between gap-2">
      <h4 class="text-sm font-semibold text-slate-800">扣减货位</h4>
      <button type="button" class="text-sm font-medium text-slate-700 hover:underline" data-outbound-loc-add>添加</button>
    </div>
    <div data-outbound-loc-list><div class="outbound-loc-row mb-3 grid gap-3 rounded-xl border border-slate-200 bg-slate-50/40 p-3 sm:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_minmax(0,1fr)_100px_auto] sm:items-end" data-outbound-loc-row>
    <div><label class="mb-1 block text-xs font-medium text-slate-600"><span class="text-rose-500">*</span> 仓库</label><select data-outbound-warehouse class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>主仓库</option><option>辅仓库</option></select></div>
    <div><label class="mb-1 block text-xs font-medium text-slate-600">货架</label><select data-outbound-shelf class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>CK001001-HJ001</option><option>CK001001-HJ002</option><option>CK001001-HJ003</option><option>CK001001-HJ101</option></select></div>
    <div><label class="mb-1 block text-xs font-medium text-slate-600">架层</label><select data-outbound-level class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>1层</option><option>2层</option><option>3层</option></select></div>
    <div><label class="mb-1 block text-xs font-medium text-slate-600"><span class="text-rose-500">*</span> 数量</label><input type="number" min="1" data-outbound-qty placeholder="请输入" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
    <span class="w-10"></span>
  </div></div>
    <p class="mt-2 text-xs text-slate-500">从指定货位扣减库存；各行数量之和不超过待出库数量 <strong data-outbound-pending-qty-display>—</strong></p>
  </div>
        <div class="md:col-span-2 rounded-xl border border-amber-100 bg-amber-50/50 p-4">
    <div class="mb-1 flex items-center gap-2 text-sm font-semibold text-slate-900"><i class="fa-solid fa-screwdriver-wrench text-amber-600"></i> 类资产按数量出库</div>
    <p class="text-xs text-slate-600">从指定货位扣减库存；需归还的类资产出库后进入待还物资。</p>
  </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">其他信息</h3></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">出库说明</label><textarea rows="3" placeholder="0/500" data-outbound-field="remark" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">出库照片</label><div class="wms-photo-upload">
    <button type="button" class="flex h-20 w-20 flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-200 text-slate-400 hover:border-slate-300 hover:bg-slate-50">
      <i class="fa-solid fa-plus text-lg"></i>
      <span class="mt-1 text-xs">上传图片</span>
    </button>
    <p class="mt-2 text-xs text-slate-400">支持 .jpg .jpeg .png，单个文件不能超过 100MB</p>
  </div></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 出库人员</label><select data-outbound-field="operator" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>张仓管</option><option>李仓管</option></select></div>
        <div><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 出库部门</label><select data-outbound-field="department" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option value="" disabled selected>请选择</option><option>物资管理部</option><option>设备部</option></select></div>
      </div>
      <div class="wms-modal-footer">
        <a href="warehouse_outbound_list.html" class="wms-btn wms-btn-secondary" data-outbound-back-link>取消</a>
        <button type="button" class="wms-btn wms-btn-primary" data-outbound-submit>确定</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
