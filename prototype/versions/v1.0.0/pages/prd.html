<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产品需求文档 · WMS PRD</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body class="wms-prd-body">
  <header class="wms-prd-header">
    <div class="wms-prd-header-inner wms-prd-header-inner--wide">
      <a href="../index.html" class="wms-prd-back">
        <i class="fa-solid fa-arrow-left"></i>
        返回原型入口
      </a>
      <div class="wms-prd-header-title">
        <h1>物资仓库管理系统 · PRD</h1>
        <p id="prd-meta">加载中…</p>
      </div>
    </div>
  </header>

  <main class="wms-prd-layout">
    <aside class="wms-prd-toc" id="prd-toc" aria-label="文档目录">
      <div class="wms-prd-toc-inner">
        <p class="wms-prd-toc-title">目录</p>
        <nav id="prd-toc-nav" class="wms-prd-toc-nav"></nav>
      </div>
    </aside>
    <article id="prd-content" class="wms-prd-prose">
      <p class="text-slate-500">正在加载文档…</p>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script src="./prd-content.js"></script>
  <script>
    (function () {
      var contentEl = document.getElementById('prd-content');
      var metaEl = document.getElementById('prd-meta');
      var tocNav = document.getElementById('prd-toc-nav');
      var embeddedMd = window.__WMS_PRD_MARKDOWN__ || '';

      function slugHeading(text) {
        return text.trim()
          .replace(/[（(].*?[）)]/g, '')
          .toLowerCase()
          .replace(/[^\w\u4e00-\u9fff\s-]/g, '')
          .replace(/\s+/g, '-');
      }

      var renderer = new marked.Renderer();
      renderer.heading = function (text, level) {
        var slug = slugHeading(text);
        return '<h' + level + ' id="' + slug + '">' + text + '</h' + level + '>';
      };

      marked.setOptions({ gfm: true, breaks: false, renderer: renderer });

      mermaid.initialize({
        startOnLoad: false,
        theme: 'neutral',
        securityLevel: 'loose',
        flowchart: { htmlLabels: true, curve: 'basis' },
        stateDiagram: { htmlLabels: true },
        sequence: { mirrorActors: false, showSequenceNumbers: true },
      });

      function decodeCode(html) {
        return html
          .replace(/&lt;/g, '<')
          .replace(/&gt;/g, '>')
          .replace(/&amp;/g, '&')
          .replace(/&quot;/g, '"');
      }

      function renderMermaid(html) {
        return html.replace(
          /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
          function (_, code) {
            return '<div class="mermaid">' + decodeCode(code) + '</div>';
          }
        );
      }

      function extractMeta(md) {
        var version = (md.match(/\|\s*文档版本\s*\|\s*([^|]+)\|/) || [])[1];
        var updated = (md.match(/\|\s*最后更新\s*\|\s*([^|]+)\|/) || [])[1];
        var parts = [];
        if (version) parts.push('版本 ' + version.trim());
        if (updated) parts.push('更新 ' + updated.trim());
        return parts.join(' · ') || 'docs/prd.md';
      }

      function parseTocFromMarkdown(md) {
        var items = [];
        var inToc = false;
        md.split('\n').forEach(function (line) {
          if (/^##\s+目录\s*$/.test(line)) { inToc = true; return; }
          if (inToc && /^---\s*$/.test(line)) { inToc = false; return; }
          if (!inToc) return;
          var m = line.match(/^(\s*)-\s+\[([^\]]+)\]\(#([^)]+)\)/);
          if (m) {
            items.push({ indent: m[1].length, label: m[2], href: '#' + m[3] });
          }
        });
        return items;
      }

      function buildTocNav(items) {
        if (!items.length) return '';
        return items.map(function (item) {
          var cls = 'wms-prd-toc-link';
          if (item.indent >= 4) cls += ' wms-prd-toc-link--l3';
          else if (item.indent >= 2) cls += ' wms-prd-toc-link--l2';
          return '<a href="' + item.href + '" class="' + cls + '" data-toc-href="' + item.href + '">' + item.label + '</a>';
        }).join('');
      }

      function bindTocScroll() {
        tocNav.querySelectorAll('a[data-toc-href]').forEach(function (a) {
          a.addEventListener('click', function (e) {
            e.preventDefault();
            var id = a.getAttribute('href').slice(1);
            var target = document.getElementById(id);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              history.replaceState(null, '', '#' + id);
              tocNav.querySelectorAll('.is-active').forEach(function (el) { el.classList.remove('is-active'); });
              a.classList.add('is-active');
            }
          });
        });

        // 正文内目录链接同样平滑滚动
        contentEl.querySelectorAll('a[href^="#"]').forEach(function (a) {
          a.addEventListener('click', function (e) {
            var id = a.getAttribute('href').slice(1);
            var target = document.getElementById(id);
            if (target) {
              e.preventDefault();
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              history.replaceState(null, '', '#' + id);
            }
          });
        });

        // 深链：打开时滚动到 hash
        if (location.hash) {
          var el = document.getElementById(location.hash.slice(1));
          if (el) setTimeout(function () { el.scrollIntoView({ block: 'start' }); }, 100);
        }
      }

      function renderMd(md) {
        metaEl.textContent = extractMeta(md);
        var tocItems = parseTocFromMarkdown(md);
        tocNav.innerHTML = buildTocNav(tocItems);

        // 去掉正文中的「目录」块，避免与侧栏重复
        var bodyMd = md.replace(/^##\s+目录[\s\S]*?^---\s*$/m, '');
        var html = marked.parse(bodyMd);
        html = renderMermaid(html);
        contentEl.innerHTML = html;
        bindTocScroll();
        return mermaid.run({ nodes: contentEl.querySelectorAll('.mermaid') });
      }

      function renderLoadError(err) {
        metaEl.textContent = '加载失败';
        contentEl.innerHTML =
          '<div class="wms-prd-error">' +
          '<p><strong>无法加载 PRD 文档</strong></p>' +
          '<p class="mt-2 text-sm">当前浏览器无法读取远程或本地 PRD 源文件。</p>' +
          '<p class="mt-2 text-sm text-slate-500">' + err.message + '</p>' +
          '<p class="mt-4 text-sm">也可在仓库中直接打开 <code>docs/versions/v1.0.0/prd.md</code>。</p>' +
          '</div>';
      }

      fetch('../../../docs/versions/v1.0.0/prd.md')
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(renderMd)
        .catch(function (err) {
          if (embeddedMd) {
            renderMd(embeddedMd);
            return;
          }
          renderLoadError(err);
        });
    })();
  </script>
</body>
</html>
