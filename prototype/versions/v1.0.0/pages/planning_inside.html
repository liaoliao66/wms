 class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">电钻</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">主仓库</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">B区</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">B-03</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">8</td><td class="wms-col-actions px-4 py-3.5 text-slate-900 text-right text-sm whitespace-nowrap"><a href="#" class="hover:underline">查看</a></td></tr></tbody></table></div>
