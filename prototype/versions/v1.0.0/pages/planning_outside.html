      <div class="mb-4 flex w-full flex-nowrap items-center justify-end gap-2 overflow-x-auto" data-wms-list-toolbar><div class="relative shrink-0 w-[280px]">
    <i class="fa-solid fa-magnifying-glass pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-sm text-slate-400"></i>
    <input type="search" data-wms-list-search placeholder="物资编码、物资名称、使用地点" class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-9 pr-9 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" />

  </div><button type="button" class="hidden shrink-0 items-center gap-1.5 rounded-xl px-3 py-2 text-sm text-slate-600 hover:bg-slate-100" data-wms-list-reset><i class="fa-solid fa-rotate-left text-xs"></i>重置</button></div>
      <div class="card overflow-hidden rounded-2xl bg-white shadow-sm" data-wms-list-card>

-700 whitespace-nowrap">2</td><td class="px-4 py-3.5 text-sm text-slate-700 whitespace-nowrap">李工</td><td class="wms-col-actions px-4 py-3.5 text-slate-900 text-right text-sm whitespace-nowrap"><a href="#" class="hover:underline">查看</a></td></tr></tbody></table></div>

  </div>
        <div class="flex flex-wrap items-center justify-between gap-3 border-t border-slate-100 px-4 py-3 text-sm text-slate-500">
