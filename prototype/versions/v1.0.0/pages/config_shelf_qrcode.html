<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>货位二维码 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="config_warehouse" data-title="货位二维码" data-breadcrumb="基础配置 / 货位二维码">
  <div id="main-content">
    <div data-wms-modal data-modal-back="config_warehouse.html" data-modal-size="md">
      <div class="wms-qr-fullscreen text-center">
        <div class="mx-auto inline-block rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=wms%3A%2F%2Floc%2FCK001001-HJ001" width="200" height="200" alt="货位二维码 CK001001-HJ001" class="wms-qr-image wms-loc-qr-image" loading="lazy" />
          <div class="mt-4 font-mono text-sm font-semibold text-slate-900" data-shelf-field="code">CK001001-HJ001</div>
          <div class="mt-1 text-sm text-slate-600" data-shelf-field="name">1号货架</div>
          <div class="mt-0.5 text-xs text-slate-400" data-shelf-field="location">1号仓库 / A区</div>
        </div>
        <p class="mt-4 text-xs text-slate-500">扫码解析：<code class="rounded bg-slate-100 px-1.5 py-0.5" data-shelf-uri>wms://loc/CK001001-HJ001</code></p>
        <p class="mt-2 text-xs text-amber-700">货位码仅用于物理位置定位，不可替代固定资产资产码</p>
        <div class="mt-6 border-t border-slate-100 pt-6 text-left">
          <h4 class="mb-3 text-sm font-semibold text-slate-900">打印标签预览（40×60mm）</h4>
          <div class="flex justify-center wms-loc-qr-label-wrap"><div class="wms-qr-label wms-loc-qr-label">
    <div class="wms-qr-label-code"><img src="https://api.qrserver.com/v1/create-qr-code/?size=96x96&data=wms%3A%2F%2Floc%2FCK001001-HJ001" width="96" height="96" alt="货位二维码 CK001001-HJ001" class="wms-qr-image wms-loc-qr-image" loading="lazy" /></div>
    <div class="wms-qr-label-meta">
      <div class="font-mono text-xs font-semibold text-slate-900">CK001001-HJ001</div>
      <div class="text-xs text-slate-600">1号货架</div>
      <div class="text-[10px] text-slate-400">1号仓库 / A区</div>
    </div>
  </div></div>
        </div>
      </div>
      <div class="wms-modal-footer">
        <a href="config_warehouse.html" class="wms-btn wms-btn-secondary">关闭</a>
        <button type="button" class="wms-btn wms-btn-secondary wms-loc-qr-print" data-shelf-code="CK001001-HJ001"><i class="fa-solid fa-print mr-1"></i>打印</button>
        <button type="button" class="wms-btn wms-btn-primary wms-loc-qr-download-single" data-shelf-code="CK001001-HJ001"><i class="fa-solid fa-download mr-1"></i>下载 PNG</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
