<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>验收标准 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="config_acceptance_standard" data-title="验收标准" data-breadcrumb="基础配置 / 验收标准">
  <div id="main-content"><div class="wms-category-layout" data-wms-acceptance-layout>
    <aside class="wms-category-tree card rounded-2xl bg-white p-4">
      <div class="mb-3 text-sm font-semibold text-slate-900">物资分类</div>
      <ul class="wms-tree space-y-0.5 text-sm" data-wms-acceptance-tree>
        <li>
          <button type="button" class="wms-tree-node wms-tree-node--group w-full flex items-center gap-2 rounded-lg px-2 py-2 text-left font-medium text-slate-700 hover:bg-slate-50">
            <i class="fa-solid fa-chevron-down w-3 text-[10px] text-slate-400"></i>
            <i class="fa-regular fa-folder-open text-slate-400"></i><span>资产类</span>
          </button>
          <ul class="ml-5 mt-0.5 space-y-0.5 border-l border-slate-100 pl-2">
            <li><button type="button" class="wms-tree-node wms-tree-node--major w-full flex items-center gap-2 rounded-lg px-2 py-1.5 text-left is-active bg-blue-50/80 text-blue-600" data-acceptance-key="fixed">
      <i class="fa-regular fa-file text-blue-400"></i>
      <span class="flex-1 truncate">固定资产<span class="ml-1 text-xs text-slate-400">（待配置）</span></span>
    </button></li>
            <li><button type="button" class="wms-tree-node wms-tree-node--major w-full flex items-center gap-2 rounded-lg px-2 py-1.5 text-left text-slate-600 hover:bg-slate-50" data-acceptance-key="like">
      <i class="fa-regular fa-file text-slate-400"></i>
      <span class="flex-1 truncate">类资产<span class="ml-1 text-xs text-blue-500">（已配置）</span></span>
    </button></li>
          </ul>
        </li>
        <li class="mt-2">
          <button type="button" class="wms-tree-node wms-tree-node--group w-full flex items-center gap-2 rounded-lg px-2 py-2 text-left font-medium text-slate-700 hover:bg-slate-50">
            <i class="fa-solid fa-chevron-down w-3 text-[10px] text-slate-400"></i>
            <i class="fa-regular fa-folder-open text-slate-400"></i><span>耗材类</span>
          </button>
          <ul class="ml-5 mt-0.5 space-y-0.5 border-l border-slate-100 pl-2">
            <li><button type="button" class="wms-tree-node wms-tree-node--major w-full flex items-center gap-2 rounded-lg px-2 py-1.5 text-left text-slate-600 hover:bg-slate-50" data-acceptance-key="bg">
      <i class="fa-regular fa-file text-slate-400"></i>
      <span class="flex-1 truncate">办公耗材<span class="ml-1 text-xs text-blue-500">（已配置）</span></span>
    </button></li>
            <li><button type="button" class="wms-tree-node wms-tree-node--major w-full flex items-center gap-2 rounded-lg px-2 py-1.5 text-left text-slate-600 hover:bg-slate-50" data-acceptance-key="sc">
      <i class="fa-regular fa-file text-slate-400"></i>
      <span class="flex-1 truncate">生产耗材<span class="ml-1 text-xs text-slate-400">（待配置）</span></span>
    </button></li>
            <li><button type="button" class="wms-tree-node wms-tree-node--major w-full flex items-center gap-2 rounded-lg px-2 py-1.5 text-left text-slate-600 hover:bg-slate-50" data-acceptance-key="lb">
      <i class="fa-regular fa-file text-slate-400"></i>
      <span class="flex-1 truncate">劳保耗材<span class="ml-1 text-xs text-slate-400">（待配置）</span></span>
    </button></li>
          </ul>
        </li>
      </ul>
    </aside>
    <div class="wms-category-main card rounded-2xl bg-white p-5 min-w-0 flex flex-col">
      <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <h3 class="text-sm font-semibold text-slate-900">验收标准</h3>
        <div class="flex items-center gap-2">
          <button type="button" class="inline-flex items-center gap-1.5 rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200 hover:bg-slate-50" data-wms-acceptance-edit><i class="fa-regular fa-pen-to-square text-xs text-slate-400"></i>编辑</button>
          <button type="button" class="inline-flex items-center gap-1.5 rounded-xl bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50" data-wms-acceptance-save disabled>保存</button>
        </div>
      </div>
      <textarea
        data-wms-acceptance-editor
        rows="14"
        readonly
        placeholder="请输入验收标准"
        class="wms-acceptance-editor min-h-[360px] flex-1 w-full resize-y rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm leading-relaxed text-slate-700 outline-none read-only:bg-slate-50 read-only:cursor-default focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-100"
      ></textarea>
      <p class="mt-3 text-xs text-slate-400">每一种子类拥有一套验收标准；默认只读，点击「编辑」后可修改并保存（无版本概念，物资验收时展示最新内容）。</p>
    </div>
  </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
