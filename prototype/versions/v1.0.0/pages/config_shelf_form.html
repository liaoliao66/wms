<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新增货架 · 物资管理系统</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/custom.css" />
  <link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="config_warehouse" data-title="新增货架" data-breadcrumb="基础配置 / 新增货架">
  <div id="main-content">
    <div data-wms-modal data-modal-back="config_warehouse.html" data-modal-size="lg">
      <div class="wms-modal-form wms-warehouse-form">
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">基础信息</h3></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 所在仓库</label><select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option selected>1号仓库</option></select></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 所在分区</label><select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option selected>A区</option><option>B区</option></select></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">货架编码</label><input type="text" value="CK001001-HJ001" readonly class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500" /></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 货架名称</label><input type="text" value="1号货架" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">负责人</label><select class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"><option>张三</option><option>李四</option><option>张飞</option></select></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700">启用</label><label class="wms-toggle"><input type="checkbox" checked /><span class="wms-toggle-track"></span></label></div>
        <div class=""><label class="mb-1.5 block text-sm font-medium text-slate-700"><span class="text-rose-500">*</span> 层数</label><input type="number" value="4" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200" /></div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">货位二维码</h3></div>
        <div class="md:col-span-2 rounded-xl border border-slate-200 bg-slate-50/80 p-4" data-shelf-qr-block>
          <div class="flex flex-wrap items-start gap-4">
                <div class="wms-qr-label wms-loc-qr-label">
    <div class="wms-qr-label-code"><img src="https://api.qrserver.com/v1/create-qr-code/?size=96x96&data=wms%3A%2F%2Floc%2FCK001001-HJ001" width="96" height="96" alt="货位二维码 CK001001-HJ001" class="wms-qr-image wms-loc-qr-image" loading="lazy" /></div>
    <div class="wms-qr-label-meta">
      <div class="font-mono text-xs font-semibold text-slate-900">CK001001-HJ001</div>
      <div class="text-xs text-slate-600">1号货架</div>
      <div class="text-[10px] text-slate-400">1号仓库 / A区</div>
    </div>
  </div>
                <div class="text-sm">
                  <p class="text-slate-600">扫码内容</p>
                  <p class="mt-1 font-mono text-xs text-slate-800" data-shelf-uri>wms://loc/CK001001-HJ001</p>
                  <div class="mt-3 flex flex-wrap gap-2">
                    <a href="config_shelf_qrcode.html?code=CK001001-HJ001" class="text-blue-600 hover:underline">全屏查看</a>
                    <button type="button" class="wms-loc-qr-download-single text-blue-600 hover:underline" data-shelf-code="CK001001-HJ001">下载 PNG</button>
                  </div>
                  <p class="mt-2 text-xs text-slate-400">货架保存后系统自动生成，编码不可修改</p>
                </div>
              </div>
        </div>
        <div class="wms-form-section md:col-span-2"><h3 class="wms-form-section-title">其他信息</h3></div>
        <div class=" md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">说明</label><textarea rows="3" placeholder="0/500" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"></textarea></div>
        <div class="md:col-span-2"><label class="mb-1.5 block text-sm font-medium text-slate-700">资料</label><div class="wms-upload-zone">
    <i class="fa-solid fa-cloud-arrow-up text-lg text-slate-400"></i>
    <p class="mt-2 text-sm text-slate-600">上传文件</p>
    <p class="mt-1 text-xs text-slate-400">支持 .rar .zip .doc .docx .pdf，单个文件不能超过 500MB</p>
  </div></div>
      </div>
      <div class="wms-modal-footer">
        <a href="config_warehouse.html" class="wms-btn wms-btn-secondary">取消</a>
        <button type="button" class="wms-btn wms-btn-primary">确定</button>
      </div>
    </div></div>
  <script src="../js/layout.js" charset="UTF-8"></script>
</body></html>
