<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作台 · 物资管理系统</title>
  <link rel="stylesheet" href="css/tailwind.css" />
  <link rel="stylesheet" href="css/custom.css" />
  <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css" />
</head>
<body data-page="dashboard" data-title="工作台" data-breadcrumb="首页 / 工作台" data-index="true">
  <div id="main-content">
    <div class="mb-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      <div class="card rounded-2xl bg-white p-5">
        <div class="flex items-center justify-between"><span class="text-sm text-slate-500">待审批</span><i class="fa-solid fa-file-circle-check text-slate-300"></i></div>
        <div class="mt-2 text-3xl font-semibold text-slate-900">8</div>
        <a href="pages/purchase_request_list.html" class="mt-2 inline-block text-xs font-medium text-slate-600 hover:underline">查看全部 →</a>
      </div>
      <div class="card rounded-2xl bg-white p-5">
        <div class="flex items-center justify-between"><span class="text-sm text-slate-500">待验物资</span><i class="fa-solid fa-clipboard-check text-slate-300"></i></div>
        <div class="mt-2 text-3xl font-semibold text-slate-900">5</div>
        <a href="pages/warehouse_pending_check.html" class="mt-2 inline-block text-xs font-medium text-slate-600 hover:underline">去验收 →</a>
      </div>
      <div class="card rounded-2xl bg-white p-5">
        <div class="flex items-center justify-between"><span class="text-sm text-slate-500">待入库</span><i class="fa-solid fa-arrow-down-to-bracket text-slate-300"></i></div>
        <div class="mt-2 text-3xl font-semibold text-slate-900">3</div>
        <a href="pages/warehouse_inbound_list.html" class="mt-2 inline-block text-xs font-medium text-slate-600 hover:underline">去入库 →</a>
      </div>
      <div class="card rounded-2xl bg-white p-5">
        <div class="flex items-center justify-between"><span class="text-sm text-slate-500">待还超期</span><i class="fa-solid fa-triangle-exclamation text-rose-300"></i></div>
        <div class="mt-2 text-3xl font-semibold text-rose-600">2</div>
        <a href="pages/mine_pending_return.html" class="mt-2 inline-block text-xs font-medium text-slate-600 hover:underline">去处理 →</a>
      </div>
    </div>

    <div class="grid gap-6 lg:grid-cols-3">
      <div class="card lg:col-span-2 overflow-hidden rounded-2xl bg-white">
        <div class="flex items-center justify-between border-b border-slate-100 px-6 py-4">
          <h2 class="font-semibold text-slate-900">待办事项</h2>
          <a href="pages/purchase_message.html" class="text-sm text-slate-500 hover:text-slate-900">消息中心</a>
        </div>
        <ul class="divide-y divide-slate-100">
          <li class="flex items-center gap-4 px-6 py-4 hover:bg-slate-50/80">
            <span class="rounded-lg bg-amber-50 px-2 py-1 text-xs font-medium text-amber-700">审批</span>
            <span class="flex-1 text-sm text-slate-700">采购申请 CG202606090002 待审批</span>
            <a href="pages/purchase_request_list.html" class="text-sm font-medium text-slate-900 hover:underline">处理</a>
          </li>
          <li class="flex items-center gap-4 px-6 py-4 hover:bg-slate-50/80">
            <span class="rounded-lg bg-emerald-50 px-2 py-1 text-xs font-medium text-emerald-700">入库</span>
            <span class="flex-1 text-sm text-slate-700">验收单 YS202606080015 待入库</span>
            <a href="pages/warehouse_inbound_list.html" class="text-sm font-medium text-slate-900 hover:underline">处理</a>
          </li>
          <li class="flex items-center gap-4 px-6 py-4 hover:bg-slate-50/80">
            <span class="rounded-lg bg-slate-100 px-2 py-1 text-xs font-medium text-slate-700">出库</span>
            <span class="flex-1 text-sm text-slate-700">领用单 LY202606070002 待出库</span>
            <a href="pages/warehouse_outbound_list.html" class="text-sm font-medium text-slate-900 hover:underline">处理</a>
          </li>
          <li class="flex items-center gap-4 px-6 py-4 hover:bg-slate-50/80">
            <span class="rounded-lg bg-sky-50 px-2 py-1 text-xs font-medium text-sky-700">流水</span>
            <span class="flex-1 text-sm text-slate-700">今日出入库 12 笔，待核对 2 笔</span>
            <a href="pages/ledger_transaction.html" class="text-sm font-medium text-slate-900 hover:underline">查看</a>
          </li>
        </ul>
      </div>
      <div class="card overflow-hidden rounded-2xl bg-white">
        <div class="border-b border-slate-100 px-6 py-4"><h2 class="font-semibold text-slate-900">库存概览</h2></div>
        <div class="p-6">
          <img src="https://images.unsplash.com/photo-1553413077-190dd305871c?auto=format&fit=crop&w=600&q=80" alt="仓库" class="mb-4 h-32 w-full rounded-xl object-cover" />
          <dl class="space-y-3 text-sm">
            <div class="flex justify-between"><dt class="text-slate-500">在库物资种类</dt><dd class="font-semibold text-slate-900">1,248</dd></div>
            <div class="flex justify-between"><dt class="text-slate-500">本月出入库</dt><dd class="font-semibold text-slate-900">326 笔</dd></div>
            <div class="flex justify-between"><dt class="text-slate-500">本月出入库</dt><dd class="font-semibold text-slate-900"><a href="pages/ledger_transaction.html" class="hover:underline">326 笔</a></dd></div>
          </dl>
          <a href="pages/ledger_warehouse.html" class="mt-4 flex w-full items-center justify-center rounded-xl bg-slate-900 py-2.5 text-sm font-medium text-white hover:bg-slate-800">查看仓库台账</a>
        </div>
      </div>
    </div>

    <div class="mt-6 card rounded-2xl bg-white p-6">
      <h2 class="mb-4 font-semibold text-slate-900">快捷入口</h2>
      <div class="grid grid-cols-2 gap-3 sm:grid-cols-4 lg:grid-cols-6">
        <a href="pages/apply_plan_form.html" class="flex flex-col items-center gap-2 rounded-xl p-4 text-center hover:bg-slate-50"><i class="fa-solid fa-clipboard-list text-lg text-slate-600"></i><span class="text-xs text-slate-600">新增计划</span></a>
        <a href="pages/purchase_pending_list.html" class="flex flex-col items-center gap-2 rounded-xl p-4 text-center hover:bg-slate-50"><i class="fa-solid fa-cart-shopping text-lg text-slate-600"></i><span class="text-xs text-slate-600">待采物资</span></a>
        <a href="pages/warehouse_acceptance_list.html" class="flex flex-col items-center gap-2 rounded-xl p-4 text-center hover:bg-slate-50"><i class="fa-solid fa-clipboard-check text-lg text-slate-600"></i><span class="text-xs text-slate-600">物资验收</span></a>
        <a href="pages/apply_requisition_form.html" class="flex flex-col items-center gap-2 rounded-xl p-4 text-center hover:bg-slate-50"><i class="fa-solid fa-file-signature text-lg text-slate-600"></i><span class="text-xs text-slate-600">领用申请</span></a>
        <a href="pages/ledger_transaction.html" class="flex flex-col items-center gap-2 rounded-xl p-4 text-center hover:bg-slate-50"><i class="fa-solid fa-right-left text-lg text-slate-600"></i><span class="text-xs text-slate-600">出入库记录</span></a>
        <a href="pages/config_warehouse.html" class="flex flex-col items-center gap-2 rounded-xl p-4 text-center hover:bg-slate-50"><i class="fa-solid fa-sitemap text-lg text-slate-600"></i><span class="text-xs text-slate-600">仓库配置</span></a>
      </div>
    </div>
  </div>
  <script src="js/layout.js" charset="UTF-8"></script>
</body>
</html>
